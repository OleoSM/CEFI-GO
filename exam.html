<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0B0617" />
  <title>Simulacro UNAM · CEFITIPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Rubik:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/app.css" />

  <script src="js/router.js"></script>
</head>
<body>

  <div class="aurora-bg" aria-hidden="true">
    <div class="aurora-blob aurora-blob--2"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="exam-layout">

    <div class="exam-main">
      <div class="exam-topbar">
        <div style="display:flex;gap:var(--sp-3);align-items:center;">
          <a href="course.html" class="icon-btn" aria-label="Salir del examen" style="background:transparent;border-color:var(--border-soft);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          <div class="exam-topbar__left">
            <span class="exam-topbar__name">Simulacro UNAM · Área 2</span>
            <span class="exam-topbar__id">Examen real 2024 · 120 reactivos</span>
          </div>
        </div>
        <div class="timer" data-exam-timer aria-live="polite">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="13" r="8" stroke="currentColor" stroke-width="1.8"/><path d="M12 9v4l2 2M9 2h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          02:30:00
        </div>
      </div>

      <div class="question-card">
        <div class="question-meta">
          <span class="question-counter" data-exam-counter>Pregunta 1 de 10</span>
          <span>Módulo: Biología · Celular</span>
        </div>
        <p class="question-text" data-exam-question>...</p>

        <form class="options" data-exam-options></form>
      </div>

      <nav class="exam-nav" aria-label="Navegación del examen">
        <button class="btn btn--glass" data-exam-prev>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Anterior
        </button>
        <button class="btn btn--glass" data-exam-flag>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="flag-label">Marcar</span>
        </button>
        <button class="btn btn--primary" data-exam-next>
          Siguiente
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </nav>
    </div>

    <aside class="exam-sidebar" aria-label="Mapa de preguntas">
      <h4>Mapa de preguntas</h4>
      <div class="q-grid" data-exam-grid></div>

      <div class="q-legend">
        <span><span class="dot-legend" style="background:rgba(16,185,129,0.3);border:1px solid rgba(16,185,129,0.5);"></span>Respondida</span>
        <span><span class="dot-legend" style="background:var(--grad-button);"></span>Actual</span>
        <span><span class="dot-legend" style="background:rgba(245,158,11,0.3);border:1px solid rgba(245,158,11,0.5);"></span>Marcada</span>
        <span><span class="dot-legend" style="background:rgba(255,255,255,0.05);border:1px solid var(--border-soft);"></span>Sin responder</span>
      </div>

      <div style="margin-top:var(--sp-6);padding-top:var(--sp-5);border-top:1px solid var(--border-soft);">
        <a href="dashboard.html" class="btn btn--primary btn--full" onclick="return confirm('¿Terminar el simulacro? No podrás volver a editar tus respuestas.')">
          Terminar simulacro
        </a>
        <a href="dashboard.html" class="btn btn--glass btn--full" style="margin-top:var(--sp-3);">
          Guardar y salir
        </a>
      </div>
    </aside>
  </div>

  <script>
    window.__examData = {
      total: 10,
      timeSeconds: 9000,
      questions: [
        {
          text: "¿Cuál de las siguientes estructuras celulares es responsable de la síntesis de proteínas a partir de la información genética del ARNm?",
          options: [
            "Mitocondria",
            "Ribosoma",
            "Aparato de Golgi",
            "Lisosoma"
          ]
        },
        {
          text: "En un movimiento rectilíneo uniformemente acelerado, si un objeto parte del reposo y alcanza una velocidad de 20 m/s en 4 segundos, ¿cuál es su aceleración?",
          options: [
            "2 m/s²",
            "4 m/s²",
            "5 m/s²",
            "80 m/s²"
          ]
        },
        {
          text: "¿Cuál es el producto de la reacción entre un ácido y una base según la teoría de Arrhenius?",
          options: [
            "Un gas y agua",
            "Una sal y agua",
            "Un óxido y un metal",
            "Un compuesto orgánico"
          ]
        },
        {
          text: "En la siguiente oración: 'El estudiante que ganó el concurso viajará a Cambridge', ¿qué función sintáctica desempeña 'que ganó el concurso'?",
          options: [
            "Proposición subordinada adjetiva",
            "Proposición subordinada sustantiva",
            "Proposición subordinada adverbial",
            "Proposición coordinada copulativa"
          ]
        },
        {
          text: "¿Cuál fue la principal causa inmediata de la Revolución Mexicana de 1910?",
          options: [
            "La invasión estadounidense de 1846",
            "La promulgación de la Constitución de 1857",
            "La reelección de Porfirio Díaz y el descontento social",
            "La guerra de los Pasteles"
          ]
        },
        {
          text: "Si f(x) = 2x² − 3x + 1, ¿cuál es el valor de f(2)?",
          options: [
            "3",
            "5",
            "6",
            "11"
          ]
        },
        {
          text: "¿Qué tipo de tejido vegetal se encarga del transporte de agua y sales minerales desde la raíz hasta las hojas?",
          options: [
            "Floema",
            "Xilema",
            "Parénquima",
            "Epidermis"
          ]
        },
        {
          text: "Dos resistencias de 6 Ω y 12 Ω se conectan en paralelo. ¿Cuál es la resistencia equivalente del circuito?",
          options: [
            "18 Ω",
            "9 Ω",
            "4 Ω",
            "2 Ω"
          ]
        },
        {
          text: "¿Cuál de los siguientes NO es un compuesto orgánico?",
          options: [
            "Glucosa (C₆H₁₂O₆)",
            "Metano (CH₄)",
            "Dióxido de carbono (CO₂)",
            "Etanol (C₂H₅OH)"
          ]
        },
        {
          text: "En la teoría sintética de la evolución, el principal mecanismo que explica los cambios en las frecuencias de los alelos de una población es:",
          options: [
            "La herencia de caracteres adquiridos",
            "La selección natural",
            "El uso y desuso de los órganos",
            "La creación espontánea"
          ]
        }
      ]
    };
  </script>
  <script src="js/app.js"></script>
</body>
</html>
